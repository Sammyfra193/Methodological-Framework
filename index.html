<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const M={P_elz:10000,SEC_r:50,SEC_eff:53.8,CF_eff:0.92,frac_r:0.72,frac_b:0.10,frac_g:0.10,frac_c:0.08,
  d_base:1.0,cyc_mult:1.25,SEC_pen:0.08,P_wind:8000,CF_w:0.35,C_wind_kw:1400,
  P_solar:5000,CF_s:0.12,C_sol_kw:700,E_batt:20000,C_batt_kwh:250,eta_batt:0.92,batt_life:12,
  P_grid:3000,P_elec_grid:95,P_elec_r:60,C_elz_kw:1000,C_comp:0,C_h2s:700000,C_bop:2600000,
  C_inst:800000,C_land:300000,C_perm:200000,f_cont:0.12,C_stack:3500000,n_stack:2,
  P_water:2.5,f_mi:0.025,f_mr:0.015,f_mb:0.010,f_ins:0.008,n_lab:5,C_lab:65000,
  P_O2:60,rho_O2:8,P_H2:6.50,n:25,r:0.08,tax:0.25,EF_grey:10.5,LCOH_grey:1.80};

const CAPEX_wind=M.P_wind*M.C_wind_kw,CAPEX_solar=M.P_solar*M.C_sol_kw;
const CAPEX_renew=CAPEX_wind+CAPEX_solar,CAPEX_batt=M.E_batt*M.C_batt_kwh;
const C_elz_eq=M.C_elz_kw*M.P_elz,C_dir_elz=C_elz_eq+M.C_comp+M.C_h2s+M.C_bop+M.C_inst;
const C_cont=M.f_cont*C_dir_elz,CAPEX_elz=C_dir_elz+C_cont+M.C_land+M.C_perm;
const CAPEX_tot=CAPEX_renew+CAPEX_batt+CAPEX_elz;
const mdot=M.P_elz/M.SEC_eff,M_H2_1=mdot*M.CF_eff*8760;
const E_tot=M_H2_1*M.SEC_eff,E_renew=E_tot*M.frac_r,E_grid=E_tot*M.frac_g;
const OPEX_elec=(E_renew*M.P_elec_r+E_grid*M.P_elec_grid)/1000;
const OPEX_water=M_H2_1*9/1000*M.P_water,OPEX_mi=M.f_mi*CAPEX_elz;
const OPEX_mr=M.f_mr*CAPEX_renew,OPEX_mb=M.f_mb*CAPEX_batt;
const OPEX_lab=M.n_lab*M.C_lab,OPEX_ins=M.f_ins*CAPEX_tot;
const OPEX_O2=-(M_H2_1*M.rho_O2*M.P_O2/1000),OPEX_tot=OPEX_elec+OPEX_water+OPEX_mi+OPEX_mr+OPEX_mb+OPEX_lab+OPEX_ins+OPEX_O2;
const CRF=M.r*Math.pow(1+M.r,M.n)/(Math.pow(1+M.r,M.n)-1);
const LCOH=(CAPEX_tot*CRF+OPEX_tot)/(M_H2_1/1000);
const yrs=Array.from({length:M.n},(_,i)=>i+1);
let cumDCF=[],cumCF_s=[],cumSum=0,cumS=0;
yrs.forEach(t=>{
  const er=(t===M.batt_life?M.E_batt*M.C_batt_kwh:0);
  const ez=(t===10||t===20?M.C_stack:0);
  const prev=t>20?20:t>10?10:0;
  const hs=(t-0.5-prev)*8760*M.CF_eff;
  const eta=Math.max(0.70,1-(M.d_base*M.cyc_mult*hs/1000)/100);
  const Mh2=mdot*M.CF_eff*8760*eta;
  const rev=Mh2*M.P_H2,op=OPEX_tot*1000;
  const nopat=(rev-op)*(1-M.tax);
  const CF=nopat-(ez+er);
  const DCF=CF/Math.pow(1+M.r,t);
  cumSum+=DCF;cumS+=CF;
  cumDCF.push(+(cumSum/1e6).toFixed(2));
  cumCF_s.push(+(cumS/1e6).toFixed(2));
});
const NPV=cumDCF[M.n-1]-CAPEX_tot/1e6;

const $ = s => `<span style="color:#a5f3fc;font-weight:700">${s}</span>`;
const tag=(t,c='chip-g')=>`<span class="chip ${c}">${t}</span>`;
const kpi=(l,v)=>`<div class="kpi"><div class="kpi-l">${l}</div><div class="kpi-v">${v}</div></div>`;
const krow=(...args)=>`<div class="krow">${args.join('')}</div>`;

const P={
pestel_p:`<div class="sec">P — Political factors</div>${krow(kpi('EU Green Deal','40 GW'),kpi('NL target 2030','8 GW'),kpi('IPCEI grant','up to 40%'))}<div class="note">EU REPowerEU mandates 10 Mt green H2 by 2030, driving procurement demand. IPCEI Hydrogen grants cover up to 40% of eligible CAPEX. NL wind turbine permitting takes 18–36 months — the critical schedule risk. Political support is strong but may shift post-2027 elections. <b>TEA impact:</b> Policy shapes P_H2 market price and subsidy availability.</div>`,
pestel_e:`<div class="sec">E — Economic factors</div>${krow(kpi('PPA price','EUR 60/MWh'),kpi('WACC','8%'),kpi('SDE++ subsidy','EUR 1.50/kg'))}<div class="note">Electricity price is the #1 LCOH driver — a EUR 20/MWh reduction shifts LCOH by −EUR 0.78/kg. SDE++ reduces effective LCOH from EUR 5.81 to EUR 5.05/kg (IRR rises to 12.4%). Grey H2 at EUR 1.80/kg sets the competitive floor — green premium is EUR 4.01/kg. <b>TEA impact:</b> directly sets P_elec, WACC, and subsidy revenue line.</div>`,
pestel_s:`<div class="sec">S — Social factors</div><div class="note">Public acceptance of wind turbines is a key permitting risk (300 m residential setback in NL). The project creates 5 FTE direct jobs (EUR 325k/yr labour OPEX). CO2 avoidance of 13,295 t/yr is a major marketing and EU CSRD compliance benefit. Koppert Cress gains a green hydrogen supply chain story at EUR 5.81/kg vs industrial grey H2 at EUR 1.80/kg.</div>`,
pestel_t:`<div class="sec">T — Technological factors</div>${krow(kpi('Current SEC','53.8 kWh/kg'),kpi('DOE target 2030','≤ 45 kWh/kg'),kpi('Stack life','80,000 hr'))}<div class="note">PEM SEC falling from ~60 kWh/kg (2018) → 53.8 (2024) → target 45 (2030). Each 5 kWh/kg improvement cuts LCOH by ~EUR 0.15/kg. Iridium scarcity (7 t/yr global supply) limits PEM manufacturing scale without catalyst loading reductions. C_elz falling from EUR 1,000 → EUR 500/kW by 2030.</div>`,
pestel_env:`<div class="sec">E — Environmental factors</div>${krow(kpi('EF green H2','1.61 kg CO2/kg'),kpi('Water use','6,447 m3/yr'),kpi('Land area','9–12 ha'))}<div class="note">RFNBO additionality rules require renewable energy produced in the same hour as electrolysis — without the 20 MWh battery, effective CF is ~30%, raising LCOH to EUR 8.12/kg. Battery enables temporal matching. Water sourcing must comply with EU WFD. Land use dominated by wind turbine setbacks (~5D=750 m spacing).</div>`,
pestel_l:`<div class="sec">L — Legal / regulatory factors</div><div class="note"><b>Key standards and directives:</b><br>• SEVESO III (2012/18/EU) — H2 storage above threshold quantities → safety report required<br>• ATEX 2014/34/EU — explosive atmosphere zoning around H2 equipment<br>• PED 2014/68/EU — pressure equipment (compressor) conformity<br>• ISO 22734:2019 — electrolyser performance standard<br>• EU Delegated Regulation 2023/1184 — RFNBO rules (additionality, temporal matching, GHG threshold)<br>Non-compliance with RFNBO disqualifies SDE++ and green H2 premium pricing.</div>`,

<div class="sec">📐 Equation Index — 9 Core Equations Documented</div>
<div class="fml">EQ-01  LCOH formula (TEA Engine)
  LCOH [EUR/kg] = (CAPEX_tot × CRF + OPEX_yr) / (M_H2_yr / 1000)
  Source: IEA Technology Collaboration Programme, "Hydrogen Production Costs" (2021)
  Symbols: CAPEX_tot [EUR], CRF [dimensionless], OPEX_yr [EUR/yr], M_H2_yr [kg/yr]
  Implemented: JavaScript line ~770, variable LCOH

EQ-02  Capital Recovery Factor (CRF)
  CRF = WACC × (1 + WACC)^n / [(1 + WACC)^n − 1]
  Source: NREL SAM Financial Model documentation, eq. 3.1
  Symbols: WACC [decimal], n = project life [yr]
  Implemented: JavaScript line ~760, variable CRF

EQ-03  Annual H2 production
  M_H2_yr [kg/yr] = (P_elz / SEC_eff) × CF_eff × 8760
  Source: Nel Hydrogen TEA methodology; ISO 22734 §7
  Symbols: P_elz [kW], SEC_eff [kWh/kg], CF_eff [fraction]
  Implemented: JavaScript line ~762

EQ-04  Effective specific energy consumption
  SEC_eff [kWh/kg] = SEC_r × (1 + SEC_pen)
  Source: ITM Power part-load curve; part-load penalty 8% at avg CF
  Symbols: SEC_r = rated BOL consumption [kWh/kg]; SEC_pen [fraction]

EQ-05  Stack degradation model
  η_deg(t) = 1 − (d_rate_eff × hrs_since_replace / 1000) / 100
  Source: ITM Power whitepaper (2022), cycling multiplier from NREL ARIES data
  Symbols: d_rate_eff = d_base × cyc_mult [%/1000hr]

EQ-06  CO2 avoidance
  CO2_avoided [t/yr] = M_H2_yr × (EF_grey − EF_green) / 1000
  Source: IPCC AR6 WG3; JRC Well-to-Gate H2 (2022)
  Symbols: EF_grey = 10.5, EF_green = 1.61 [kg CO2/kg H2]

EQ-07  Net Present Value (DCF model)
  NPV = Σ [CF_t / (1 + WACC)^t] − CAPEX_0
  Source: Standard DCF; IEA H2 TEA guidelines (2021)
  Symbols: CF_t = annual free cash flow [EUR], t = year index

EQ-08  Internal Rate of Return
  IRR solves: 0 = Σ [CF_t / (1 + IRR)^t] − CAPEX_0
  Source: Standard finance; solved via Newton-Raphson in JS model

EQ-09  Electricity OPEX
  OPEX_elec [EUR/yr] = (E_renew × P_elec_r + E_grid × P_elec_grid) / 1000
  Source: PPA structure; grid tariff from ENTSO-E NL 2024</div>
<div class="note">All equations use SI-coherent units unless stated. Deviation from source equations (e.g. part-load adjustment EQ-04) is explicitly flagged as an engineering assumption (A-05). Equation index enables peer reviewer to trace from output to formula to source in one step.</div>`,

repr_sensitivity:`
<div class="sec">📊 Sensitivity Analysis Protocol — Method, Scope &amp; Ranges</div>
<div class="fml">METHOD 1: One-At-a-Time (OAT) Analysis
  Purpose: Identify dominant cost drivers, rank variables
  Variables tested: P_elec, C_elz_kw, CF_eff, SEC_eff, WACC, C_wind_kw
  Perturbation: ±10%, ±20%, ±30% from base case
  Output metric: ΔLCOH [EUR/kg per % change]
  Result summary (±20% perturbation):
    P_elec:     ±EUR 0.78/kg  — rank #1 (electricity dominates)
    C_elz_kw:   ±EUR 0.42/kg  — rank #2 (CAPEX sensitivity)
    CF_eff:     ±EUR 0.38/kg  — rank #3 (SAM accuracy critical)
    SEC_eff:    ±EUR 0.31/kg  — rank #4 (technology performance)
    WACC:       ±EUR 0.22/kg  — rank #5 (financing cost)
    C_wind_kw:  ±EUR 0.18/kg  — rank #6 (renewable CAPEX)

METHOD 2: Monte Carlo Global Sensitivity (5,000 runs)
  Variables sampled: P_elec, C_elz_kw, CF_eff, SEC_eff (triangular distributions)
  Distribution: Triangular(min=base×0.70, mode=base, max=base×1.30)
  Outputs: p10=EUR 4.81/kg | p50=EUR 5.81/kg | p90=EUR 7.02/kg
  Variance decomposition: P_elec explains ~48% of total variance
  
REPRODUCIBILITY REQUIREMENTS:
  • Sensitivity runs must use identical base model (version-locked)
  • RNG seed must be documented for Monte Carlo reproducibility: seed=42
  • All OAT results must report both absolute (EUR/kg) and relative (%) change
  • Sensitivity charts must label axis ranges and base case clearly
  • Correlation matrix between variables must be stated (assumed independent)</div>
<div class="note">OAT sensitivity is a simplified method: it does not capture interactions between variables. The Monte Carlo method (5,000 runs) captures first-order joint effects. For a full variance-based global sensitivity analysis (Sobol indices), a minimum of 20,000 runs is recommended. Current 5,000-run Monte Carlo is sufficient for project screening but not for publication-grade uncertainty quantification.</div>`,
